services:
  postgres:
    image: postgres:16-alpine
    container_name: mb-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mb_password}
      POSTGRES_DB: ${POSTGRES_DB:-mb_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mb_user} -d ${POSTGRES_DB:-mb_database}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mb-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # 单容器：前后端同端口 9000，ngrok 直接代理此端口即可
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: http://host.docker.internal:7897
        HTTPS_PROXY: http://host.docker.internal:7897
        http_proxy: http://host.docker.internal:7897
        https_proxy: http://host.docker.internal:7897
    container_name: mb-app
    restart: unless-stopped
    ports:
      - '9000:9000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mb_user}:${POSTGRES_PASSWORD:-mb_password}@postgres:5432/${POSTGRES_DB:-mb_database}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-key-change-in-production-16chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-jwt-refresh-secret-key-change-in-production-16chars}
      - API_PORT=9000
      - ALLOW_ORIGIN=http://localhost:9000
      - COOKIE_SECURE=false
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
